name: Main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'Dockerfile'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'packages/**'
  pull_request:
    branches:
      - main

env:
  DATABASE_USERNAME: unleash
  DATABASE_PASSWORD: unleash
  DATABASE_NAME: unleash
  DATABASE_HOST: localhost
  DATABASE_SSL: false
  INIT_ADMIN_API_TOKENS: "*:*.unleash4all"
  GOOGLE_IAP_AUDIENCE: "/projects/123/global/backendServices/123"
  OAUTH_JWT_AUTH: "true"
  OAUTH_JWT_AUDIENCE: "test-audience"
  OAUTH_JWT_ISSUER: "https://auth.nais.io"
  OAUTH_JWT_KEYSET: "https://auth.nais.io/oauth/v2/keys"

jobs:
  # These jobs run in parallel for faster feedback
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # ratchet:pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # ratchet:actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint

  # Detect versions early so docker builds can start as soon as tests pass
  detect-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      versions: ${{ steps.detect.outputs.versions }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Detect available Unleash versions
        id: detect
        run: |
          versions=$(ls -d packages/unleash-v* 2>/dev/null | sed 's|packages/unleash-||' | jq -R -s -c 'split("\n")[:-1]')
          echo "versions=${versions}" >> "$GITHUB_OUTPUT"
          echo "Detected versions: ${versions}"

  # Test shared package (no database needed)
  test-shared:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # ratchet:pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # ratchet:actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm --filter @nais/unleash-shared test

  # Test each Unleash version with its own database (runs in parallel)
  test-unleash:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-versions
    permissions:
      contents: read
    strategy:
      matrix:
        version: ${{ fromJson(needs.detect-versions.outputs.versions) }}
    services:
      postgres:
        image: index.docker.io/library/postgres@sha256:d1c2ec5683f89f861117e4ec87f63a0ce52d431738f53c903793ef3aeef0205b # ratchet:postgres:14
        env:
          POSTGRES_USER: ${{ env.DATABASE_USERNAME }}
          POSTGRES_PASSWORD: ${{ env.DATABASE_PASSWORD }}
          POSTGRES_DB: unleash_${{ matrix.version }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_NAME: unleash_${{ matrix.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # ratchet:pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # ratchet:actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm --filter unleash-${{ matrix.version }} test

  # PR: Build Docker images and run full e2e tests
  docker-e2e-pr:
    runs-on: ubuntu-latest
    needs: [lint, detect-versions, test-shared, test-unleash]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    strategy:
      matrix:
        version: ${{ fromJson(needs.detect-versions.outputs.versions) }}
    services:
      postgres:
        image: index.docker.io/library/postgres@sha256:d1c2ec5683f89f861117e4ec87f63a0ce52d431738f53c903793ef3aeef0205b # ratchet:postgres:14
        env:
          POSTGRES_USER: unleash
          POSTGRES_PASSWORD: unleash
          POSTGRES_DB: unleash
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # ratchet:docker/setup-buildx-action@v4.0.0

      - name: Build Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # ratchet:docker/build-push-action@v7.0.0
        with:
          context: .
          build-args: |
            UNLEASH_VERSION=${{ matrix.version }}
          push: false
          load: true
          tags: nais-unleash:${{ matrix.version }}-test

      - name: Run e2e tests
        run: |
          # Start container with host networking to reach PostgreSQL service
          docker run -d --name unleash-e2e-${{ matrix.version }} \
            --network host \
            -e DATABASE_HOST=localhost \
            -e DATABASE_USERNAME=unleash \
            -e DATABASE_PASSWORD=unleash \
            -e DATABASE_NAME=unleash \
            -e DATABASE_SSL=false \
            -e DATABASE_PORT=5432 \
            -e INIT_ADMIN_API_TOKENS="*:*.unleash4all" \
            -e GOOGLE_IAP_AUDIENCE="/projects/123/global/backendServices/123" \
            nais-unleash:${{ matrix.version }}-test

          # Wait for server to start (max 60s for database migrations)
          echo "Waiting for server to start..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:4242/health > /dev/null 2>&1; then
              echo "Server started after ${i}s"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Server failed to start within 60s"
              docker logs unleash-e2e-${{ matrix.version }}
              exit 1
            fi
            sleep 1
          done

          # Test health endpoint
          echo "Testing /health endpoint..."
          health=$(curl -s http://localhost:4242/health)
          if ! echo "$health" | grep -q '"health":"GOOD"'; then
            echo "Health check failed: $health"
            docker logs unleash-e2e-${{ matrix.version }}
            exit 1
          fi
          echo "✓ Health check passed"

          # Test prometheus endpoint
          echo "Testing /internal-backstage/prometheus endpoint..."
          prom=$(curl -s http://localhost:4242/internal-backstage/prometheus)
          if ! echo "$prom" | grep -q "^# HELP"; then
            echo "Prometheus endpoint failed"
            exit 1
          fi
          echo "✓ Prometheus endpoint passed"

          # Test API authentication
          echo "Testing API with token..."
          status=$(curl -s -w "%{http_code}" -o /dev/null \
            -H "Authorization: *:*.unleash4all" \
            http://localhost:4242/api/admin/instance-admin/statistics)
          if [ "$status" != "200" ]; then
            echo "API test failed with status: $status"
            docker logs unleash-e2e-${{ matrix.version }}
            exit 1
          fi
          echo "✓ API authentication passed"

          echo "All e2e tests passed for ${{ matrix.version }}!"

  # Push: Build, push, and sign all Docker images
  build-push-sign:
    runs-on: ubuntu-latest
    needs: [lint, detect-versions, test-shared, test-unleash]
    if: github.event_name == 'push'
    strategy:
      matrix:
        version: ${{ fromJson(needs.detect-versions.outputs.versions) }}
    outputs:
      tag: ${{ matrix.version }}-${{ steps.version.outputs.unleash }}-${{ steps.version.outputs.sha_short }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Extract version
        id: version
        run: |
          unleash=$(jq -r '.dependencies["unleash-server"]' packages/unleash-${{ matrix.version }}/package.json)
          echo "unleash=${unleash}" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: nais/platform-build-push-sign@3dd09618ac5f8667477211cf201db6dcf63948a6 # ratchet:nais/platform-build-push-sign@main
        id: push
        with:
          name: nais-unleash
          context: .
          dockerfile: Dockerfile
          build_args: |
            UNLEASH_VERSION=${{ matrix.version }}
          extra_tags: |
            ${{ matrix.version }}-${{ steps.version.outputs.unleash }}
            ${{ matrix.version }}-${{ steps.version.outputs.unleash }}-${{ steps.version.outputs.sha_short }}
          google_service_account: gh-unleash
          push: true
          workload_identity_provider: ${{ secrets.NAIS_IO_WORKLOAD_IDENTITY_PROVIDER }}

  git-tag:
    runs-on: ubuntu-latest
    needs: [detect-versions, build-push-sign]
    permissions:
      contents: write
    strategy:
      matrix:
        version: ${{ fromJson(needs.detect-versions.outputs.versions) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Extract version for tag
        id: version
        run: |
          unleash=$(jq -r '.dependencies["unleash-server"]' packages/unleash-${{ matrix.version }}/package.json)
          echo "unleash=${unleash}" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: git tag and push
        run: |
          tag="${{ matrix.version }}-${{ steps.version.outputs.unleash }}-${{ steps.version.outputs.sha_short }}"
          git tag "${tag}"
          git push origin "${tag}"
