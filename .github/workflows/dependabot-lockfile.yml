name: Fix Dependabot Lockfile

# Dependabot doesn't update pnpm-lock.yaml when updating packages in workspace subdirectories.
# This workflow regenerates the lockfile and pushes the fix to the PR branch.
# See: https://github.com/dependabot/dependabot-core/issues/11135

on:
  pull_request:
    branches: [main]
    paths:
      - "**/package.json"

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # ratchet:pnpm/action-setup@v6.0.9
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Regenerate lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Check for lockfile changes
        id: changes
        run: |
          if git diff --quiet pnpm-lock.yaml; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push lockfile
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: regenerate pnpm-lock.yaml"
          git push
